    <!-- FAQ structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Est-ce que j'ai vraiment une phobie, ou juste du dégoût ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "La différence, ce n'est pas l'intensité de la réaction. C'est ce que tu évites à cause d'elle. Le dégoût, tout le monde le ressent face au sang. La phobie te fait organiser ta vie autour de l'évitement : tu repousses des prises de sang, tu quittes une salle d'attente, tu refuses certaines situations. Si la peur du sang t'a déjà coûté quelque chose (un rendez-vous médical, un don de sang, une situation d'urgence), ce n'est plus du dégoût. C'est une phobie spécifique, reconnue par le DSM-5, qui concerne entre 3 et 4 % de la population."
          }
        },
        {
          "@type": "Question",
          "name": "Pourquoi est-ce qu'on s'évanouit en voyant du sang, alors que les autres phobies font le contraire ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Presque toutes les phobies déclenchent le système sympathique : le coeur s'emballe, la pression monte. L'hémophobie fait exactement l'inverse. Le nerf vague contre-attaque, ralentit le coeur, dilate les vaisseaux, et la pression artérielle s'effondre. C'est la réponse vasovagale biphasique. Les chercheurs pensent que ce mécanisme est un vestige évolutif : simuler la mort pour décourager un prédateur. Ton corps fait encore ça aujourd'hui face à une prise de sang. C'est involontaire, et c'est précisément pour ça qu'on peut le contourner avec une technique spécifique."
          }
        },
        {
          "@type": "Question",
          "name": "C'est prouvé par la science ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui, et on a pris soin de ne mettre dans ce programme que ce qui l'est. L'exposition graduelle est le traitement de référence des phobies spécifiques selon l'OMS. La tension musculaire appliquée a été développée et testée par Lars-Göran Öst, professeur de psychologie à Stockholm, dans des essais cliniques publiés dès 1987. Une méta-analyse portant sur plus de 1 800 patients traités par ACT a montré des effets robustes sur l'anxiété et les phobies. Toutes les sources sont accessibles sur la page Fondements scientifiques. On ne te demande pas de nous croire sur parole."
          }
        },
        {
          "@type": "Question",
          "name": "Pourquoi ce programme n'est-il pas un traitement médical ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Un traitement médical implique un diagnostic posé par un professionnel de santé, une prescription, et un suivi clinique. Ce programme ne fait rien de tout ça. Ce qu'il fait, c'est t'apprendre des techniques validées scientifiquement et te guider à travers leur application. C'est éducatif et pratique, pas clinique. Comme le sport et la médecine : marcher 30 minutes par jour est prouvé bénéfique pour le coeur, mais ce n'est pas un traitement cardiaque. Si tu as des malaises fréquents, des antécédents cardiaques, ou une phobie sévère, parle d'abord à un médecin."
          }
        },
        {
          "@type": "Question",
          "name": "La peur du sang peut-elle vraiment disparaître ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Les études sur l'exposition graduelle pour l'hémophobie montrent des taux d'amélioration significative supérieurs à 80 % des participants, maintenus à un an de suivi. L'objectif n'est pas que le sang te devienne indifférent. C'est que tu puisses faire une prise de sang, voir une scène dans un film, ou aider quelqu'un qui saigne, sans que ton corps parte en vrille. C'est ça, la liberté qu'on vise."
          }
        },
        {
          "@type": "Question",
          "name": "C'est quoi exactement la tension musculaire appliquée ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Développée par le professeur Öst à Stockholm en 1987, elle repose sur un principe direct : si la réponse vasovagale fait chuter ta pression artérielle, tu peux la contrer en augmentant cette pression manuellement. En contractant les muscles des bras, des jambes et de l'abdomen pendant 15 à 20 secondes, ton coeur reçoit un signal de résistance, la pression remonte, et le malaise s'éloigne. Dans les études cliniques, cette technique a permis d'éliminer les évanouissements chez la quasi-totalité des patients traités."
          }
        },
        {
          "@type": "Question",
          "name": "Comment ça se passe concrètement, la première séance ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Tu t'inscris, c'est gratuit. La première séance dure environ 20 minutes. Tu lis, tu comprends, tu n'es exposé·e à rien que des mots. Le module 1 commence par la science : pourquoi ton corps réagit comme il le fait, ce que l'hémophobie est réellement, et pourquoi l'évitement aggrave les choses. Pas d'image, pas de vidéo, pas de confrontation. Juste une porte ouverte. Si tu décides de continuer, tu accèdes aux 6 modules suivants pour 295€ une seule fois, sans abonnement."
          }
        }
      ]
    }
    </script>
